<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 炼金叔叔 10000x BTC/USDT 永续合约模拟器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { background: #0a0a1f; }
        .price-up { color: #00ff88; animation: flash 0.5s; }
        .price-down { color: #ff3366; animation: flash 0.5s; }
        @keyframes flash { 0% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body class="text-white min-h-screen">
    <div class="max-w-4xl mx-auto p-6">
        <div class="bg-red-900/30 border border-red-500 text-red-400 text-center py-4 rounded-2xl mb-8">
            ⚠️ 10000倍杠杆仅供娱乐！现实中价格波动 0.01% 就会瞬间爆仓！纯模拟勿当真！
        </div>

        <h1 class="text-4xl font-bold text-center mb-2">🔥 炼金叔叔 10000x BTC/USDT</h1>
        <p class="text-center text-gray-400 mb-8">永续合约模拟器 • 实时 WebSocket 更新</p>

        <!-- 实时价格 + 图表 -->
        <div class="bg-[#1a1a2e] rounded-3xl p-8 mb-8">
            <div id="price" class="text-7xl font-bold text-center mb-2 transition-colors">加载中...</div>
            <div id="price-change" class="text-center text-xl font-medium"></div>
            <canvas id="priceChart" class="mt-6" height="180"></canvas>

            <!-- 时间框架切换 -->
            <div class="flex justify-center gap-4 mt-6">
                <button onclick="changeTimeframe('1m')" class="px-5 py-2 bg-gray-700 hover:bg-gray-600 rounded" id="tf-1m">1m</button>
                <button onclick="changeTimeframe('5m')" class="px-5 py-2 bg-gray-700 hover:bg-gray-600 rounded" id="tf-5m">5m</button>
                <button onclick="changeTimeframe('15m')" class="px-5 py-2 bg-gray-700 hover:bg-gray-600 rounded active" id="tf-15m">15m</button>
                <button onclick="changeTimeframe('1h')" class="px-5 py-2 bg-gray-700 hover:bg-gray-600 rounded" id="tf-1h">1h</button>
            </div>
        </div>

        <!-- 余额 & 杠杆 -->
        <div class="grid grid-cols-2 gap-6 mb-8">
            <div class="bg-[#1a1a2e] p-6 rounded-2xl">
                <div class="text-gray-400 text-sm">账户余额</div>
                <div id="balance" class="text-4xl font-bold text-emerald-400">10,000.00 USDT</div>
            </div>
            <div class="bg-[#1a1a2e] p-6 rounded-2xl">
                <div class="text-gray-400 text-sm">杠杆倍数</div>
                <div class="text-4xl font-bold text-amber-400">10,000x</div>
            </div>
        </div>

        <!-- 当前仓位 -->
        <div id="position-card" class="bg-[#1a1a2e] rounded-3xl p-8 mb-8 hidden">
            <div class="flex justify-between items-center mb-4">
                <div class="text-xl font-bold" id="pos-side"></div>
                <button onclick="closePosition()" class="bg-red-600 hover:bg-red-700 px-8 py-3 rounded-xl font-medium">一键平仓</button>
            </div>
            <div id="pos-info" class="grid grid-cols-2 gap-6 text-lg"></div>
        </div>

        <!-- 开仓区域 -->
        <div class="bg-[#1a1a2e] rounded-3xl p-8 mb-8">
            <div class="text-xl font-bold mb-6">开新仓位</div>
            <div class="flex items-center gap-6 flex-col sm:flex-row">
                <div class="w-full sm:flex-1">
                    <label class="block text-gray-400 text-sm mb-2">保证金 (USDT)</label>
                    <input id="margin" type="number" value="10" class="w-full bg-[#0f0f1f] border border-gray-600 rounded-2xl px-6 py-4 text-2xl focus:outline-none focus:border-amber-400">
                </div>
                <div class="flex gap-4 w-full sm:w-auto">
                    <button onclick="openLong()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-xl sm:text-2xl font-bold px-8 py-5 sm:px-10 sm:py-6 rounded-3xl transition">🚀 开多</button>
                    <button onclick="openShort()" class="flex-1 bg-red-600 hover:bg-red-500 text-xl sm:text-2xl font-bold px-8 py-5 sm:px-10 sm:py-6 rounded-3xl transition">🔻 开空</button>
                </div>
            </div>
        </div>

        <!-- 交易历史 -->
        <div class="bg-[#1a1a2e] rounded-3xl p-8">
            <div class="text-xl font-bold mb-6">交易历史</div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-gray-400">
                            <th class="text-left py-3">时间</th>
                            <th class="text-left py-3">方向</th>
                            <th class="text-left py-3">开仓价</th>
                            <th class="text-left py-3">平仓价</th>
                            <th class="text-left py-3">盈亏 (USDT)</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
            <div id="stats" class="mt-4 text-gray-400 text-sm"></div>
        </div>

        <div class="text-center text-gray-500 mt-10 text-sm">
            价格来自 Binance Futures • 刷新页面数据不丢 • 仅供娱乐
        </div>
    </div>

    <script>
        let balance = 10000;
        let leverage = 10000;
        let position = null;
        let currentPrice = 0;
        let prevPrice = 0;
        let priceHistory = [];
        let chart;
        let trades = []; // 新增：交易历史数组

        const wsUrl = "wss://fstream.binance.com/ws/btcusdt@markPrice";

        function loadData() {
            if (localStorage.getItem('simBalance')) balance = parseFloat(localStorage.getItem('simBalance'));
            if (localStorage.getItem('simPosition')) position = JSON.parse(localStorage.getItem('simPosition'));
            if (localStorage.getItem('simTrades')) trades = JSON.parse(localStorage.getItem('simTrades'));
        }

        function saveData() {
            localStorage.setItem('simBalance', balance);
            if (position) localStorage.setItem('simPosition', JSON.stringify(position));
            else localStorage.removeItem('simPosition');
            localStorage.setItem('simTrades', JSON.stringify(trades));
        }

        function updateBalance() {
            document.getElementById('balance').textContent = balance.toLocaleString('zh-CN', {minimumFractionDigits: 2}) + ' USDT';
        }

        function updateStats() {
            const total = trades.length;
            const wins = trades.filter(t => t.pnl > 0).length;
            const totalPnl = trades.reduce((sum, t) => sum + t.pnl, 0);
            const winRate = total ? (wins / total * 100).toFixed(1) : 0;
            document.getElementById('stats').innerHTML = `总交易: ${total} | 胜率: ${winRate}% | 总盈亏: <span class="${totalPnl >= 0 ? 'text-emerald-400' : 'text-red-400'}">${totalPnl.toFixed(2)} USDT</span>`;
        }

        function initChart() {
            const ctx = document.getElementById('priceChart');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ label: '价格', data: [], borderColor: '#00ff88', tension: 0.4, borderWidth: 3 }] },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#333' } } } }
            });
        }

        async function changeTimeframe(tf) {
            document.querySelectorAll('[id^="tf-"]').forEach(btn => btn.classList.remove('bg-green-600', 'text-white'));
            document.getElementById('tf-' + tf).classList.add('bg-green-600', 'text-white');

            const limit = tf === '1h' ? 100 : 200;
            try {
                const res = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=BTCUSDT&interval=${tf}&limit=${limit}`);
                const data = await res.json();
                priceHistory = data.map(k => parseFloat(k[4])); // close price
                chart.data.labels = priceHistory.map((_, i) => i);
                chart.data.datasets[0].data = priceHistory;
                chart.update();
            } catch (e) {
                console.error('K线加载失败', e);
            }
        }

        function updatePrice(price) {
            const priceEl = document.getElementById('price');
            if (prevPrice) {
                priceEl.classList.toggle('price-up', price > prevPrice);
                priceEl.classList.toggle('price-down', price < prevPrice);
            }
            priceEl.textContent = price.toFixed(2);
            document.getElementById('price-change').textContent = prevPrice ? (price - prevPrice).toFixed(2) : '';

            prevPrice = currentPrice = price;
            priceHistory.push(price);
            if (priceHistory.length > 80) priceHistory.shift();
            chart.data.datasets[0].data = priceHistory;
            chart.update('none');

            if (position) {
                updatePosition();
                checkLiquidation();
            }
        }

        function connectWebSocket() {
            const ws = new WebSocket(wsUrl);
            ws.onmessage = event => {
                const data = JSON.parse(event.data);
                const price = parseFloat(data.p);
                if (price) updatePrice(price);
            };
            ws.onclose = () => setTimeout(connectWebSocket, 3000);
        }

        function calculatePNL() {
            if (!position) return 0;
            return position.side === 'long' 
                ? position.qty * (currentPrice - position.entry)
                : position.qty * (position.entry - currentPrice);
        }

        function updatePosition() {
            const pnl = calculatePNL();
            const roi = (pnl / position.margin) * 100;
            document.getElementById('position-card').classList.remove('hidden');
            document.getElementById('pos-side').innerHTML = position.side === 'long' ? '🟢 多头' : '🔴 空头';
            document.getElementById('pos-info').innerHTML = `
                <div>开仓价: ${position.entry.toFixed(2)}</div>
                <div>仓位: ${position.qty.toFixed(6)} BTC</div>
                <div>保证金: ${position.margin.toFixed(2)} USDT</div>
                <div class="${pnl >= 0 ? 'text-emerald-400' : 'text-red-400'}">盈亏: ${pnl.toFixed(2)} (${roi.toFixed(2)}%)</div>
            `;
        }

        function checkLiquidation() {
            if (!position) return;
            const pnl = calculatePNL();
            if (pnl <= -position.margin) {
                alert(`💥 爆仓！亏损 ${pnl.toFixed(2)} USDT`);
                balance += pnl;
                position = null;
                document.getElementById('position-card').classList.add('hidden');
                updateBalance();
                saveData();
            }
        }

        function openPosition(side) {
            if (position) return alert('已有仓位，请先平仓');
            const margin = parseFloat(document.getElementById('margin').value);
            if (isNaN(margin) || margin <= 0 || margin > balance) return alert('保证金无效');
            const qty = (margin * leverage) / currentPrice;
            position = { side, entry: currentPrice, qty, margin };
            balance -= margin;
            updateBalance();
            updatePosition();
            saveData();
            alert(`开${side === 'long' ? '多' : '空'}成功`);
        }

        function openLong() { openPosition('long'); }
        function openShort() { openPosition('short'); }

        function closePosition() {
            if (!position) return;
            const pnl = calculatePNL();
            trades.push({
                time: new Date().toLocaleString(),
                side: position.side === 'long' ? '多' : '空',
                entry: position.entry.toFixed(2),
                exit: currentPrice.toFixed(2),
                pnl: pnl.toFixed(2)
            });
            balance += position.margin + pnl;
            alert(`平仓完成，盈亏: ${pnl.toFixed(2)} USDT`);
            position = null;
            document.getElementById('position-card').classList.add('hidden');
            updateBalance();
            renderHistory();
            updateStats();
            saveData();
        }

        function renderHistory() {
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = trades.map(t => `
                <tr>
                    <td class="py-2">${t.time}</td>
                    <td class="${t.side === '多' ? 'text-emerald-400' : 'text-red-400'}">${t.side}</td>
                    <td>${t.entry}</td>
                    <td>${t.exit}</td>
                    <td class="${parseFloat(t.pnl) >= 0 ? 'text-emerald-400' : 'text-red-400'}">${t.pnl}</td>
                </tr>
            `).join('');
        }

        // 初始化
        window.onload = () => {
            loadData();
            updateBalance();
            updateStats();
            renderHistory();
            initChart();
            connectWebSocket();
            fetch('https://fapi.binance.com/fapi/v1/ticker/price?symbol=BTCUSDT')
                .then(r => r.json())
                .then(d => updatePrice(parseFloat(d.price)))
                .catch(() => document.getElementById('price').textContent = '价格加载失败');
            changeTimeframe('15m'); // 默认15m
        };
    </script>
</body>
</html>
