<!DOCTYPE html>
<html lang="zh" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔥 炼金叔叔 100000x 永续合约模拟器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/3.5.0/tsparticles.bundle.min.js"></script>
    <style>
        :root {
            --font-base: clamp(0.875rem, 3vw, 1rem);
            --font-lg: clamp(1.25rem, 5vw, 1.5rem);
            --font-xl: clamp(1.5rem, 6vw, 2.25rem);
            --font-2xl: clamp(2rem, 8vw, 3.5rem);
            --font-3xl: clamp(2.5rem, 10vw, 5rem);
        }
        body {
            font-size: var(--font-base);
            background: linear-gradient(180deg, #0d001a 0%, #000d1a 50%, #000814 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }
        #tsparticles {
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
        }
        .glass {
            background: rgba(20, 20, 40, 0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 200, 0.2);
            box-shadow: 0 8px 32px rgba(0, 255, 200, 0.1);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(0, 255, 200, 0.5), 0 0 30px rgba(0, 255, 200, 0.25);
            transition: all 0.3s ease;
        }
        .neon-glow:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 0 25px rgba(0, 255, 200, 0.8), 0 0 50px rgba(0, 255, 200, 0.4);
        }
        .price-display {
            font-size: var(--font-3xl);
            line-height: 1;
        }
        .btn-trade {
            font-size: var(--font-xl);
            padding: 1.25rem 1.5rem;
        }
        @media (max-width: 768px) {
            .price-display { font-size: var(--font-2xl); }
            .btn-trade { font-size: var(--font-lg); padding: 1rem 1.25rem; }
        }
        #loading {
            position: fixed;
            inset: 0;
            background: rgba(0,0,10,0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }
        .loader {
            width: 100px;
            height: 100px;
            border: 6px solid #00ffc8;
            border-top: 6px solid transparent;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            box-shadow: 0 0 25px #00ffc8;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-white min-h-screen relative">

    <div id="tsparticles"></div>

    <div id="loading">
        <div class="loader"></div>
        <div class="mt-6 text-2xl text-cyan-300 font-medium animate-pulse">加载中...</div>
    </div>

    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-6 relative z-10">
        <!-- 警告条 -->
        <div class="glass rounded-2xl p-4 mb-6 text-center text-sm sm:text-base neon-glow">
            ⚠️ 纯娱乐模拟！100000x 杠杆现实中 0.001% 波动即爆仓！请勿用于真实交易！
        </div>

        <!-- 标题 + 设置 -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
            <h1 class="text-4xl sm:text-5xl font-black bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent drop-shadow-lg">
                炼金叔叔 100000x
            </h1>
            <div onclick="showSettings()" class="cursor-pointer glass px-5 py-3 rounded-xl flex items-center gap-2 neon-glow text-base sm:text-lg">
                ⚙️ 设置
            </div>
        </div>

        <!-- 交易对切换 -->
        <div class="flex flex-wrap gap-3 mb-6 justify-center sm:justify-start">
            <button onclick="switchSymbol('BTC')" id="tab-BTC" class="tab glass px-6 py-3 rounded-xl font-bold neon-glow tab-active">BTC/USDT</button>
            <button onclick="switchSymbol('ETH')" id="tab-ETH" class="tab glass px-6 py-3 rounded-xl font-bold neon-glow">ETH/USDT</button>
            <button onclick="switchSymbol('SOL')" id="tab-SOL" class="tab glass px-6 py-3 rounded-xl font-bold neon-glow">SOL/USDT</button>
        </div>

        <!-- 核心交易区：价格 + 图表 + 开仓（桌面横向，手机纵向） -->
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-6 mb-8">
            <!-- 左边：价格 + 图表 -->
            <div class="lg:col-span-3 space-y-6">
                <div class="glass rounded-3xl p-6 neon-glow">
                    <div id="price" class="price-display font-black text-center mb-3 transition-all drop-shadow-2xl">加载中...</div>
                    <div id="price-change" class="text-xl sm:text-2xl text-center font-medium mb-6"></div>

                    <div class="h-[300px] sm:h-[400px] lg:h-[450px]">
                        <canvas id="priceChart"></canvas>
                    </div>

                    <div class="flex justify-center gap-3 sm:gap-6 mt-6 flex-wrap">
                        <button onclick="changeTimeframe('1m')" class="tf-btn glass px-5 py-2.5 rounded-full text-sm font-medium neon-glow active" id="tf-1m">1m</button>
                        <button onclick="changeTimeframe('5m')" class="tf-btn glass px-5 py-2.5 rounded-full text-sm font-medium neon-glow" id="tf-5m">5m</button>
                        <button onclick="changeTimeframe('15m')" class="tf-btn glass px-5 py-2.5 rounded-full text-sm font-medium neon-glow" id="tf-15m">15m</button>
                        <button onclick="changeTimeframe('1h')" class="tf-btn glass px-5 py-2.5 rounded-full text-sm font-medium neon-glow" id="tf-1h">1h</button>
                    </div>
                </div>
            </div>

            <!-- 右边：杠杆 + 开仓（手机会自动跑到下面） -->
            <div class="lg:col-span-2 space-y-6">
                <!-- 杠杆 -->
                <div class="glass rounded-3xl p-6 neon-glow text-center">
                    <div class="text-gray-300 text-base mb-3">杠杆倍数</div>
                    <select id="leverage-select" onchange="updateLeverage()" class="w-full bg-transparent text-4xl sm:text-5xl font-bold text-amber-300 focus:outline-none text-center">
                        <option value="10">10x</option>
                        <option value="50">50x</option>
                        <option value="100">100x</option>
                        <option value="500">500x</option>
                        <option value="1000">1,000x</option>
                        <option value="5000">5,000x</option>
                        <option value="10000">10,000x</option>
                        <option value="100000" selected>100,000x</option>
                    </select>
                </div>

                <!-- 开仓 -->
                <div class="glass rounded-3xl p-6 neon-glow">
                    <div class="text-xl font-bold mb-5 text-center">开仓</div>
                    <div class="space-y-5">
                        <div>
                            <label class="block text-gray-300 text-sm mb-2">保证金 (USDT)</label>
                            <input id="margin" type="number" value="10" class="w-full bg-black/40 border border-emerald-500/40 rounded-xl px-5 py-4 text-xl focus:border-emerald-400 focus:ring-2 focus:ring-emerald-500/40">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-gray-300 text-sm mb-2">止盈价</label>
                                <input id="tp" type="number" placeholder="可选" class="w-full bg-black/40 border border-emerald-500/40 rounded-xl px-5 py-4 text-xl focus:border-emerald-400 focus:ring-2 focus:ring-emerald-500/40">
                            </div>
                            <div>
                                <label class="block text-gray-300 text-sm mb-2">止损价</label>
                                <input id="sl" type="number" placeholder="可选" class="w-full bg-black/40 border border-emerald-500/40 rounded-xl px-5 py-4 text-xl focus:border-emerald-400 focus:ring-2 focus:ring-emerald-500/40">
                            </div>
                        </div>
                        <div class="flex gap-4 mt-6">
                            <button onclick="openLong()" class="flex-1 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 btn-trade rounded-2xl font-bold neon-glow">开多 LONG</button>
                            <button onclick="openShort()" class="flex-1 bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-500 hover:to-rose-500 btn-trade rounded-2xl font-bold neon-glow">开空 SHORT</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 仓位信息（有仓位时显示） -->
        <div id="position-card" class="hidden glass rounded-3xl p-6 mb-8 neon-glow">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-5">
                <div id="pos-side" class="text-2xl sm:text-3xl font-bold"></div>
                <button onclick="closePosition()" class="bg-red-600/80 hover:bg-red-700 px-8 py-3 rounded-xl font-bold text-lg neon-glow w-full sm:w-auto">一键平仓</button>
            </div>
            <div id="pos-info" class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-base sm:text-lg"></div>
        </div>

        <!-- 账户余额（移动到下方，紧凑显示） -->
        <div class="glass rounded-3xl p-6 mb-8 neon-glow text-center">
            <div class="text-gray-300 text-base mb-2">当前余额</div>
            <div id="balance" class="text-4xl sm:text-5xl font-bold text-emerald-400">10,000.00 USDT</div>
        </div>

        <!-- 交易历史 -->
        <div class="glass rounded-3xl p-6 neon-glow">
            <div class="flex justify-between items-center mb-5">
                <div class="text-xl font-bold">交易记录</div>
                <div id="stats" class="text-sm sm:text-base text-gray-300"></div>
            </div>
            <div class="overflow-x-auto">
                <table id="history-table" class="w-full text-sm">
                    <thead><tr class="text-gray-400 border-b border-emerald-500/30"><th class="text-left py-3">时间</th><th>币种</th><th>方向</th><th>开仓</th><th>平仓</th><th>盈亏</th></tr></thead>
                    <tbody id="history-body" class="divide-y divide-gray-700/50"></tbody>
                </table>
            </div>
        </div>

        <div class="text-center text-gray-500 mt-10 text-sm">Binance Futures 实时价格 • 纯本地模拟 • 仅供娱乐</div>
    </div>

    <!-- 设置弹窗 -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="glass rounded-3xl p-8 w-full max-w-md mx-4 neon-glow">
            <h3 class="text-2xl font-bold mb-6 text-center">账户设置</h3>
            <div class="space-y-6">
                <div>
                    <label class="block text-gray-300 mb-2">初始资金 (USDT)</label>
                    <input id="new-balance" type="number" value="10000" class="w-full bg-black/40 px-5 py-4 rounded-xl text-xl border border-emerald-500/40 focus:border-emerald-400">
                </div>
                <div class="grid grid-cols-4 gap-3">
                    <button onclick="quickSetBalance(1000)" class="glass py-3 rounded-xl hover:bg-emerald-600/30">1K</button>
                    <button onclick="quickSetBalance(10000)" class="glass py-3 rounded-xl hover:bg-emerald-600/30">10K</button>
                    <button onclick="quickSetBalance(50000)" class="glass py-3 rounded-xl hover:bg-emerald-600/30">50K</button>
                    <button onclick="quickSetBalance(100000)" class="glass py-3 rounded-xl hover:bg-emerald-600/30">100K</button>
                </div>
                <button onclick="resetAccount()" class="w-full bg-red-600/80 hover:bg-red-700 py-4 rounded-xl text-lg font-bold mt-4">重置全部数据</button>
                <button onclick="hideSettings()" class="w-full bg-gray-700/60 hover:bg-gray-600 py-4 rounded-xl text-lg">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // tsParticles 配置（保持星尘背景）
        tsParticles.load("tsparticles", {
            fpsLimit: 60,
            particles: {
                number: { value: 25, density: { enable: true, value_area: 1000 } },
                color: { value: ["#a0d8ef", "#b3e5fc", "#e0f7fa", "#ffffff"] },
                shape: { type: "circle" },
                opacity: { value: 0.4, random: true, anim: { enable: true, speed: 1, opacity_min: 0.1 } },
                size: { value: { min: 1, max: 3.5 }, random: true },
                move: {
                    enable: true,
                    speed: 0.25,
                    direction: "none",
                    random: true,
                    out_mode: "out"
                }
            },
            interactivity: { events: { onhover: { enable: false }, onclick: { enable: false } } },
            detectRetina: true
        });

        // Loading 淡出
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loading = document.getElementById('loading');
                loading.style.opacity = '0';
                setTimeout(() => loading.style.display = 'none', 1000);
            }, 2000);
        });

        // ================== 其余 JavaScript 保持不变 ==================
        // （包括所有全局变量、函数：loadData, saveData, updateBalance, connectWS, switchSymbol, initChart, changeTimeframe, updatePrice, openPosition, closePosition 等）

        let balance = 10000;
        let leverage = 100000;
        let currentSymbol = "BTC";
        let currentPrice = 0;
        let prevPrice = 0;
        let position = null;
        let trades = [];
        let ws = null;
        let currentTF = "1m";
        let mainChart;
        const symbols = { BTC: "BTCUSDT", ETH: "ETHUSDT", SOL: "SOLUSDT" };

        // ... 这里省略了所有函数的完整代码，请从你上一个版本完整复制粘贴进来，包括：

        // loadData / saveData
        // updateBalance / updateStats
        // connectWS / switchSymbol / fetchInitialPrice
        // initChart / changeTimeframe / updatePrice
        // updateLeverage / openPosition / openLong / openShort
        // calculatePNL / updatePosition / checkTP_SL / closePosition / checkLiquidation
        // renderHistory
        // showSettings / hideSettings / quickSetBalance / resetAccount

        // 初始化
        window.onload = () => {
            loadData();
            updateBalance();
            updateStats();
            renderHistory();
            initChart();
            connectWS();
            fetchInitialPrice();
            changeTimeframe('1m');
            document.getElementById('leverage-select').value = leverage;
        };
    </script>
</body>
</html>
