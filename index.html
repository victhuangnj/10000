<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 炼金叔叔 10000x 永续合约模拟器 v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { background: #0a0a1f; }
        .price-up { color: #00ff88; animation: flash 0.4s; }
        .price-down { color: #ff3366; animation: flash 0.4s; }
        @keyframes flash { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        .tab-active { border-bottom: 3px solid #00ff88; color: #00ff88; }
    </style>
</head>
<body class="text-white min-h-screen">
    <div class="max-w-5xl mx-auto p-6">
        <!-- 警告 -->
        <div class="bg-red-900/30 border border-red-500 text-red-400 text-center py-4 rounded-2xl mb-6 text-sm">
            ⚠️ 纯娱乐模拟！10000x 杠杆现实中 0.005% 波动就爆仓！请勿用于真实交易！
        </div>

        <div class="flex justify-between items-center mb-4">
            <h1 class="text-4xl font-bold">🔥 10000x 永续合约模拟器</h1>
            <div onclick="showSettings()" class="cursor-pointer bg-[#1a1a2e] hover:bg-[#2a2a3e] px-5 py-2 rounded-xl flex items-center gap-2">
                ⚙️ 账户设置
            </div>
        </div>

        <!-- 交易对切换 -->
        <div class="flex gap-2 mb-6 bg-[#1a1a2e] p-1 rounded-2xl w-fit">
            <button onclick="switchSymbol('BTC')" id="tab-BTC" class="tab px-6 py-2 rounded-xl font-medium tab-active">BTC/USDT</button>
            <button onclick="switchSymbol('ETH')" id="tab-ETH" class="tab px-6 py-2 rounded-xl font-medium">ETH/USDT</button>
            <button onclick="switchSymbol('SOL')" id="tab-SOL" class="tab px-6 py-2 rounded-xl font-medium">SOL/USDT</button>
        </div>

        <!-- 实时价格 -->
        <div class="bg-[#1a1a2e] rounded-3xl p-8 mb-8">
            <div id="price" class="text-7xl font-bold text-center mb-2 transition-all">加载中...</div>
            <div id="price-change" class="text-center text-xl font-medium text-gray-400"></div>
            <canvas id="priceChart" class="mt-8" height="220"></canvas>
            
            <!-- 时间框架 -->
            <div class="flex justify-center gap-3 mt-4">
                <button onclick="changeTimeframe('1m')" class="tf-btn px-5 py-1 text-sm rounded-full bg-[#0f0f1f] hover:bg-[#00ff88] hover:text-black active" id="tf-1m">1m</button>
                <button onclick="changeTimeframe('5m')" class="tf-btn px-5 py-1 text-sm rounded-full bg-[#0f0f1f] hover:bg-[#00ff88] hover:text-black" id="tf-5m">5m</button>
                <button onclick="changeTimeframe('15m')" class="tf-btn px-5 py-1 text-sm rounded-full bg-[#0f0f1f] hover:bg-[#00ff88] hover:text-black" id="tf-15m">15m</button>
                <button onclick="changeTimeframe('1h')" class="tf-btn px-5 py-1 text-sm rounded-full bg-[#0f0f1f] hover:bg-[#00ff88] hover:text-black" id="tf-1h">1h</button>
            </div>
        </div>

        <!-- 余额 & 杠杆 -->
        <div class="grid grid-cols-2 gap-6 mb-8">
            <div class="bg-[#1a1a2e] p-6 rounded-2xl">
                <div class="text-gray-400">账户余额</div>
                <div id="balance" class="text-4xl font-bold text-emerald-400">10,000.00 USDT</div>
            </div>
            <div class="bg-[#1a1a2e] p-6 rounded-2xl">
                <div class="text-gray-400">当前杠杆</div>
                <select id="leverage-select" onchange="updateLeverage()" class="bg-transparent text-4xl font-bold text-amber-400 focus:outline-none">
                    <option value="10">10x</option>
                    <option value="50">50x</option>
                    <option value="100">100x</option>
                    <option value="500">500x</option>
                    <option value="1000">1,000x</option>
                    <option value="5000">5,000x</option>
                    <option value="10000" selected>10,000x</option>
                </select>
            </div>
        </div>

        <!-- 当前仓位 -->
        <div id="position-card" class="hidden bg-[#1a1a2e] rounded-3xl p-8 mb-8">
            <!-- 同原来，略有调整 -->
            <div class="flex justify-between mb-6">
                <div id="pos-side" class="text-2xl font-bold"></div>
                <button onclick="closePosition()" class="bg-red-600 px-8 py-3 rounded-2xl">一键平仓</button>
            </div>
            <div id="pos-info" class="grid grid-cols-2 gap-x-12 text-lg"></div>
        </div>

        <!-- 开仓区 -->
        <div class="bg-[#1a1a2e] rounded-3xl p-8 mb-10">
            <div class="text-xl font-bold mb-6">开新仓位</div>
            <div class="grid grid-cols-3 gap-6">
                <div>
                    <label class="block text-gray-400 text-sm mb-2">保证金 (USDT)</label>
                    <input id="margin" type="number" value="10" class="w-full bg-[#0f0f1f] border border-gray-600 rounded-2xl px-6 py-4 text-2xl">
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-2">止盈价 (可选)</label>
                    <input id="tp" type="number" placeholder="自动平仓" class="w-full bg-[#0f0f1f] border border-gray-600 rounded-2xl px-6 py-4 text-2xl">
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-2">止损价 (可选)</label>
                    <input id="sl" type="number" placeholder="自动平仓" class="w-full bg-[#0f0f1f] border border-gray-600 rounded-2xl px-6 py-4 text-2xl">
                </div>
            </div>
            <div class="flex gap-6 mt-8">
                <button onclick="openLong()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-6 rounded-3xl text-2xl font-bold">🚀 开多 (Long)</button>
                <button onclick="openShort()" class="flex-1 bg-red-600 hover:bg-red-500 py-6 rounded-3xl text-2xl font-bold">🔻 开空 (Short)</button>
            </div>
        </div>

        <!-- 交易历史 + 统计 -->
        <div class="bg-[#1a1a2e] rounded-3xl p-8">
            <div class="flex justify-between items-center mb-6">
                <div class="text-xl font-bold">交易历史</div>
                <div id="stats" class="text-sm text-gray-400">总交易 0 | 胜率 0% | 总盈亏 0.00 USDT</div>
            </div>
            <div class="overflow-x-auto">
                <table id="history-table" class="w-full text-sm">
                    <thead><tr class="text-gray-400"><th class="text-left py-3">时间</th><th>币种</th><th>方向</th><th>开仓价</th><th>平仓价</th><th>盈亏</th></tr></thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>

        <div class="text-center text-gray-500 mt-12 text-xs">
            价格来自 Binance Futures 官方 • 所有数据本地保存 • 纯娱乐
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
        <div class="bg-[#1a1a2e] rounded-3xl p-8 w-full max-w-md">
            <h3 class="text-2xl font-bold mb-6">账户设置</h3>
            <div class="space-y-6">
                <div>
                    <label class="block text-gray-400 mb-2">设置初始资金</label>
                    <input id="new-balance" type="number" value="10000" class="w-full bg-[#0f0f1f] px-6 py-4 rounded-2xl text-2xl">
                </div>
                <div class="grid grid-cols-4 gap-3">
                    <button onclick="quickSetBalance(1000)" class="bg-[#0f0f1f] hover:bg-emerald-600 py-3 rounded-2xl">1K</button>
                    <button onclick="quickSetBalance(10000)" class="bg-[#0f0f1f] hover:bg-emerald-600 py-3 rounded-2xl">10K</button>
                    <button onclick="quickSetBalance(50000)" class="bg-[#0f0f1f] hover:bg-emerald-600 py-3 rounded-2xl">50K</button>
                    <button onclick="quickSetBalance(100000)" class="bg-[#0f0f1f] hover:bg-emerald-600 py-3 rounded-2xl">100K</button>
                </div>
                <button onclick="resetAccount()" class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-2xl text-lg">重置全部数据（清仓+清历史）</button>
                <button onclick="hideSettings()" class="w-full bg-gray-600 hover:bg-gray-500 py-4 rounded-2xl">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // ============== 全局变量 ==============
        let balance = 10000;
        let leverage = 10000;
        let currentSymbol = "BTC";
        let currentPrice = 0;
        let prevPrice = 0;
        let position = null;
        let priceHistory = [];
        let chart;
        let trades = []; // 交易历史
        let ws = null;
        let currentTF = "1m";

        const symbols = { BTC: "BTCUSDT", ETH: "ETHUSDT", SOL: "SOLUSDT" };

        // ============== 本地存储 ==============
        function loadData() {
            if (localStorage.getItem('simBalance')) balance = parseFloat(localStorage.getItem('simBalance'));
            if (localStorage.getItem('simTrades')) trades = JSON.parse(localStorage.getItem('simTrades'));
            if (localStorage.getItem('simPosition')) position = JSON.parse(localStorage.getItem('simPosition'));
        }
        function saveData() {
            localStorage.setItem('simBalance', balance);
            localStorage.setItem('simTrades', JSON.stringify(trades));
            if (position) localStorage.setItem('simPosition', JSON.stringify(position));
            else localStorage.removeItem('simPosition');
        }

        // ============== UI 更新 ==============
        function updateBalance() {
            document.getElementById('balance').textContent = balance.toLocaleString('zh-CN', {minimumFractionDigits: 2}) + ' USDT';
        }
        function updateStats() {
            const total = trades.length;
            const wins = trades.filter(t => t.pnl > 0).length;
            const totalPnl = trades.reduce((sum, t) => sum + t.pnl, 0);
            const winRate = total ? Math.round(wins / total * 100) : 0;
            document.getElementById('stats').innerHTML = `总交易 ${total} | 胜率 ${winRate}% | 总盈亏 <span class="${totalPnl>=0?'text-emerald-400':'text-red-400'}">${totalPnl.toFixed(2)}</span> USDT`;
        }

        // ============== WebSocket ==============
        function connectWS() {
            if (ws) ws.close();
            const url = `wss://fstream.binance.com/ws/${symbols[currentSymbol].toLowerCase()}@markPrice`;
            ws = new WebSocket(url);
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                const price = parseFloat(data.p);
                if (price) updatePrice(price);
            };
            ws.onclose = () => setTimeout(connectWS, 2000);
        }

        // ============== 切换交易对 ==============
        function switchSymbol(sym) {
            if (position) {
                alert("请先平仓再切换交易对！");
                return;
            }
            currentSymbol = sym;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active'));
            document.getElementById('tab-' + sym).classList.add('tab-active');
            connectWS();
            document.getElementById('price').textContent = "切换中...";
            fetchInitialPrice();
            changeTimeframe(currentTF);
        }

        function fetchInitialPrice() {
            fetch(`https://fapi.binance.com/fapi/v1/ticker/price?symbol=${symbols[currentSymbol]}`)
                .then(r => r.json()).then(d => updatePrice(parseFloat(d.price)));
        }

        // ============== 价格更新 + 实时K线 ==============
        function updatePrice(price) {
            const priceEl = document.getElementById('price');
            if (prevPrice) {
                priceEl.classList.toggle('price-up', price > prevPrice);
                priceEl.classList.toggle('price-down', price < prevPrice);
            }
            priceEl.textContent = price.toFixed(2);
            document.getElementById('price-change').textContent = prevPrice ? (price - prevPrice).toFixed(2) : '';
            prevPrice = price;
            currentPrice = price;

            // 实时推入图表
            priceHistory.push(price);
            if (priceHistory.length > 120) priceHistory.shift();
            chart.data.datasets[0].data = priceHistory;
            chart.update('none');

            if (position) {
                updatePosition();
                checkTP_SL();
                checkLiquidation();
            }
        }

        // ============== 多时间框架 K线 ==============
        function changeTimeframe(tf) {
            currentTF = tf;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tf-' + tf).classList.add('active');

            const limit = tf === '1h' ? 100 : 200;
            fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbols[currentSymbol]}&interval=${tf}&limit=${limit}`)
                .then(r => r.json())
                .then(data => {
                    priceHistory = data.map(k => parseFloat(k[4])); // close price
                    chart.data.datasets[0].data = priceHistory;
                    chart.update();
                });
        }

        function initChart() {
            const ctx = document.getElementById('priceChart');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: Array(120).fill(''), datasets: [{ label: '价格', data: [], borderColor: '#00ff88', borderWidth: 3, tension: 0.3 }] },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#222' } } } }
            });
        }

        // ============== 杠杆 ==============
        function updateLeverage() {
            leverage = parseInt(document.getElementById('leverage-select').value);
        }

        // ============== 开仓 ==============
        function openPosition(side) {
            if (position) return alert('请先平仓！');
            const margin = parseFloat(document.getElementById('margin').value);
            const tp = parseFloat(document.getElementById('tp').value) || null;
            const sl = parseFloat(document.getElementById('sl').value) || null;

            if (!margin || margin > balance) return alert('保证金错误！');

            const qty = (margin * leverage) / currentPrice;
            position = {
                side, entry: currentPrice, qty, margin, symbol: currentSymbol,
                tp: tp, sl: sl
            };
            balance -= margin;
            updateBalance();
            updatePosition();
            saveData();
            alert(`✅ 开${side === 'long' ? '多' : '空'}成功！`);
        }
        function openLong() { openPosition('long'); }
        function openShort() { openPosition('short'); }

        // ============== TP/SL 检查 ==============
        function checkTP_SL() {
            if (!position || !currentPrice) return;
            const p = position;
            if (p.tp) {
                if ((p.side === 'long' && currentPrice >= p.tp) || (p.side === 'short' && currentPrice <= p.tp)) {
                    closePosition(true, "止盈触发");
                }
            }
            if (p.sl) {
                if ((p.side === 'long' && currentPrice <= p.sl) || (p.side === 'short' && currentPrice >= p.sl)) {
                    closePosition(true, "止损触发");
                }
            }
        }

        // ============== 平仓 & 强平 ==============
        function calculatePNL() {
            if (!position) return 0;
            const diff = position.side === 'long' ? currentPrice - position.entry : position.entry - currentPrice;
            return diff * position.qty;
        }

        function updatePosition() {
            const pnl = calculatePNL();
            const roi = (pnl / position.margin * 100).toFixed(2);
            document.getElementById('position-card').classList.remove('hidden');
            document.getElementById('pos-side').innerHTML = position.side === 'long' ? '🟢 多头' : '🔴 空头';
            document.getElementById('pos-info').innerHTML = `
                <div>开仓价 <span class="font-bold">${position.entry.toFixed(2)}</span></div>
                <div>仓位 <span class="font-bold">${position.qty.toFixed(6)} ${position.symbol}</span></div>
                <div>保证金 <span class="font-bold">${position.margin.toFixed(2)} USDT</span></div>
                <div class="${pnl>=0?'text-emerald-400':'text-red-400'}">未实现 ${pnl.toFixed(2)} (${roi}%)</div>
            `;
        }

        function closePosition(isAuto = false, reason = "") {
            if (!position) return;
            const pnl = calculatePNL();
            balance += position.margin + pnl;
            const exitPrice = currentPrice;

            trades.unshift({
                time: new Date().toLocaleString('zh-CN'),
                symbol: position.symbol,
                side: position.side === 'long' ? '多' : '空',
                entry: position.entry.toFixed(2),
                exit: exitPrice.toFixed(2),
                pnl: pnl.toFixed(2)
            });

            if (trades.length > 50) trades.pop();

            const msg = isAuto ? `💥 ${reason}！盈亏 ${pnl.toFixed(2)} USDT` : `✅ 平仓完成！盈亏 ${pnl.toFixed(2)} USDT`;
            alert(msg);

            position = null;
            document.getElementById('position-card').classList.add('hidden');
            updateBalance();
            renderHistory();
            updateStats();
            saveData();
        }

        function checkLiquidation() {
            if (!position) return;
            const pnl = calculatePNL();
            if (pnl <= -position.margin * 0.999) {
                balance += pnl;
                alert(`💥 强平！亏损 ${pnl.toFixed(2)} USDT`);
                position = null;
                document.getElementById('position-card').classList.add('hidden');
                updateBalance();
                saveData();
            }
        }

        // ============== 历史表格 ==============
        function renderHistory() {
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = trades.map(t => `
                <tr class="border-t border-gray-700">
                    <td class="py-3">${t.time}</td>
                    <td>${t.symbol}</td>
                    <td class="${t.side==='多'?'text-emerald-400':'text-red-400'}">${t.side}</td>
                    <td>${t.entry}</td>
                    <td>${t.exit}</td>
                    <td class="${parseFloat(t.pnl)>=0?'text-emerald-400':'text-red-400'}">${t.pnl}</td>
                </tr>
            `).join('');
        }

        // ============== 设置弹窗 ==============
        function showSettings() {
            document.getElementById('settings-modal').classList.remove('hidden');
            document.getElementById('new-balance').value = balance;
        }
        function hideSettings() {
            document.getElementById('settings-modal').classList.add('hidden');
        }
        function quickSetBalance(val) {
            document.getElementById('new-balance').value = val;
        }
        function resetAccount() {
            if (!confirm('确定重置全部数据？')) return;
            balance = parseFloat(document.getElementById('new-balance').value) || 10000;
            position = null;
            trades = [];
            document.getElementById('position-card').classList.add('hidden');
            updateBalance();
            renderHistory();
            updateStats();
            saveData();
            hideSettings();
            alert('账户已重置！');
        }

        // ============== 初始化 ==============
        window.onload = () => {
            loadData();
            updateBalance();
            updateStats();
            renderHistory();
            initChart();
            connectWS();
            fetchInitialPrice();
            changeTimeframe('1m');

            // 默认杠杆
            document.getElementById('leverage-select').value = leverage;
        };
    </script>
</body>
</html>
